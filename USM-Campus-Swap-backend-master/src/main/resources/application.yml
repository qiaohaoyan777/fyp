spring:
  # ✉️ 邮件服务配置
  mail:
    host: smtp.gmail.com
    port: 587
    username: qiaohaoyan777@gmail.com
    password: "bete pboz xbhn qtkw"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  # 📦 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  # 📅 全局时间格式化
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Singapore

  profiles:
    active: dev

  application:
    name: usmsecondhand

  # 💾 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/usmsecondhand?serverTimezone=Asia/Shanghai
    username: root
    password:

  # 🔐 Session 会话配置
  session:
    timeout: 30m
    store-type: none
    cookie:
      http-only: true

  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER

# 🌐 服务器端口与全局上下文
server:
  port: 8081
  servlet:
    context-path: /api
    session:
      cookie:
        http-only: true
        path: /api

# 🚀 FYP 真实本地绝对路径 (锁定你的 E:\fyp\uploads)
file:
  upload-dir: E:/fyp/uploads/
  domain: http://localhost:8081/api

# 📄 Swagger 接口文档
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# 🛠️ MyBatis-Plus 逻辑删除与架构配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

